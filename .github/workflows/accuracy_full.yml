name: Accuracy Test Full

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_and_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show CPU Info (Linux)
        if: runner.os == 'Linux'
        run: lscpu

      - name: Show CPU Info (macOS)
        if: runner.os == 'macOS'
        run: sysctl -n machdep.cpu.brand_string

      - name: Show CPU Info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors

      - name: Install IPP (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -o intelipp.zip "https://www.nuget.org/api/v2/package/intelipp.static.linux-x64/2021.2.0.233"
          mkdir -p ~/.nuget/packages/intelipp.static.linux-x64/2021.2.0.233
          unzip intelipp.zip -d ~/.nuget/packages/intelipp.static.linux-x64/2021.2.0.233
          rm intelipp.zip

      - name: Install IPP (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: nuget install intelipp.static.win-x64 -Version 2022.3.0.387
          
      - name: Accuracy Test AVX2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: python -u benchmark/accuracy_all.py 5 25 --avx2 --full

      - name: Accuracy Test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: python -u benchmark/accuracy_all.py 5 25 --full

      - name: Accuracy Test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: python -u benchmark/accuracy_all.py 5 25 --full

      - name: Accuracy Test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: python -u benchmark/accuracy_all.py 5 25 --full