name: Accuracy Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_and_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show CPU Info (Linux)
        if: runner.os == 'Linux'
        run: lscpu

      - name: Show CPU Info (macOS)
        if: runner.os == 'macOS'
        run: sysctl -n machdep.cpu.brand_string

      - name: Show CPU Info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors

      - name: Install IPP (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -o intelipp.zip "https://www.nuget.org/api/v2/package/intelipp.static.linux-x64/2021.2.0.233"
          mkdir -p ~/.nuget/packages/intelipp.static.linux-x64/2021.2.0.233
          unzip intelipp.zip -d ~/.nuget/packages/intelipp.static.linux-x64/2021.2.0.233
          rm intelipp.zip

      - name: Install IPP (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: nuget install intelipp.static.win-x64 -Version 2022.3.0.387

      - name: CFFT Accuracy Mid Test AVX2 Double (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -u benchmark/accuracy_mid.py 2 20 --avx2 --double
          python -u benchmark/accuracy_cfft.py 2 20 zldsp --avx2 --double

      - name: CFFT Accuracy Mid Test AVX2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -u benchmark/accuracy_mid.py 2 20 --avx2
          python -u benchmark/accuracy_cfft.py 2 20 zldsp --avx2
          
      - name: CFFT Accuracy Mid Test Double
        shell: bash
        run: |
          python -u benchmark/accuracy_mid.py 2 20 --double
          python -u benchmark/accuracy_cfft.py 2 20 zldsp --double

      - name: CFFT Accuracy Mid Test
        shell: bash
        run: |
          python -u benchmark/accuracy_mid.py 2 20
          python -u benchmark/accuracy_cfft.py 2 20 zldsp

      - name: RFFT Accuracy Mid Test AVX2 Double (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -u benchmark/accuracy_mid_rfft.py 2 20 --avx2 --double
          python -u benchmark/accuracy_rfft.py 2 20 zldsp --avx2 --double

      - name: RFFT Accuracy Mid Test AVX2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -u benchmark/accuracy_mid_rfft.py 2 20 --avx2
          python -u benchmark/accuracy_rfft.py 2 20 zldsp --avx2

      - name: RFFT Accuracy Mid Test Double
        shell: bash
        run: |
          python -u benchmark/accuracy_mid_rfft.py 2 20 --double
          python -u benchmark/accuracy_rfft.py 2 20 zldsp --double

      - name: RFFT Accuracy Mid Test
        shell: bash
        run: |
          python -u benchmark/accuracy_mid_rfft.py 2 20
          python -u benchmark/accuracy_rfft.py 2 20 zldsp