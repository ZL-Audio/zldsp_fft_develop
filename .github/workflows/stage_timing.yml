name: Stage Timing Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_and_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show CPU Info (Linux)
        if: runner.os == 'Linux'
        run: lscpu

      - name: Show CPU Info (macOS)
        if: runner.os == 'macOS'
        run: sysctl -n machdep.cpu.brand_string

      - name: Show CPU Info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors
          
      - name: Stage Timing AVX2 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -u benchmark/stage_timing_all.py 8 25 simd_low_order_aosoa1 --avx2
      
      - name: Stage Timing (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -u benchmark/stage_timing_all.py 8 25 simd_low_order_aosoa1

      - name: Stage Timing (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python -u benchmark/stage_timing_all.py 8 25 simd_low_order_aosoa1