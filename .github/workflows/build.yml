name: Build Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
            vcvars64_path: '"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show CPU Info (Linux)
        if: runner.os == 'Linux'
        run: lscpu

      - name: Show CPU Info (macOS)
        if: runner.os == 'macOS'
        run: sysctl -n machdep.cpu.brand_string

      - name: Show CPU Info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors

      - name: Build AVX2 Double (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=ON -DUSE_DOUBLE=ON
          cmake --build build --config Release --target zlfft_build_test

      - name: Build AVX2 (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=ON -DUSE_DOUBLE=OFF
          cmake --build build --config Release --target zlfft_build_test

      - name: Build SSE4 Double (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=OFF -DUSE_DOUBLE=ON
          cmake --build build --config Release --target zlfft_build_test

      - name: Build SSE4 (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=OFF -DUSE_DOUBLE=OFF
          cmake --build build --config Release --target zlfft_build_test

      - name: Build NEON Double (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=OFF -DUSE_DOUBLE=ON
          cmake --build build --config Release --target zlfft_build_test

      - name: Build NEON (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=OFF -DUSE_DOUBLE=OFF
          cmake --build build --config Release --target zlfft_build_test

      - name: Build AVX2 Double (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call ${{ matrix.vcvars64_path }}
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=ON -DUSE_DOUBLE=ON
          cmake --build build --config Release --target zlfft_build_test

      - name: Build AVX2 (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call ${{ matrix.vcvars64_path }}
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=ON -DUSE_DOUBLE=OFF
          cmake --build build --config Release --target zlfft_build_test

      - name: Build SSE4 Double (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call ${{ matrix.vcvars64_path }}
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=OFF -DUSE_DOUBLE=ON
          cmake --build build --config Release --target zlfft_build_test

      - name: Build SSE4 (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call ${{ matrix.vcvars64_path }}
          cmake -B build -DBUILD_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=OFF -DUSE_DOUBLE=OFF
          cmake --build build --config Release --target zlfft_build_test
