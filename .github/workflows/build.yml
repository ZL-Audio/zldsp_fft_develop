name: Build Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show CPU Info (Linux)
        if: runner.os == 'Linux'
        run: lscpu

      - name: Show CPU Info (macOS)
        if: runner.os == 'macOS'
        run: sysctl -n machdep.cpu.brand_string

      - name: Show CPU Info (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors

      - name: Build AVX2 Double (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DTHROUGHPUT_CFFT_TEST=ON -DTHROUGHPUT_RFFT_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=ON -DUSE_DOUBLE=ON
          cmake --build build --config Release --target zlfft_throughput_cfft zlfft_throughput_rfft

      - name: Build AVX2 (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DTHROUGHPUT_CFFT_TEST=ON -DTHROUGHPUT_RFFT_TEST=ON -DENABLE_ZLDSP=ON -DUSE_AVX2=ON -DUSE_DOUBLE=OFF
          cmake --build build --config Release --target zlfft_throughput_cfft zlfft_throughput_rfft